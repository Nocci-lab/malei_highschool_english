<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laughter without Boarders Spelling Test 1</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --ink:#1f2937;
      --sub:#6b7280;
      --line:#d1d5db;
      --accent:#2563eb;
      --good:#16a34a;
      --bad:#dc2626;
      --soft:#e5edff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:var(--bg);
      color:var(--ink);
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px;
    }
    .title-box{
      background:var(--card);
      border:2px solid #374151;
      border-radius:14px;
      padding:14px 18px;
      margin-bottom:14px;
    }
    .title{
      font-size:28px;
      font-weight:700;
    }
    .subtitle{
      font-size:14px;
      color:var(--sub);
      margin-top:4px;
    }
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }
    button{
      border:none;
      border-radius:12px;
      padding:10px 16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      background:#e5e7eb;
    }
    .primary{background:var(--accent); color:#fff;}
    .green{background:var(--good); color:#fff;}
    .red{background:var(--bad); color:#fff;}
    .main{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      box-shadow:0 5px 18px rgba(0,0,0,.05);
    }
    .progress-wrap{
      margin-bottom:14px;
    }
    .progress-label{
      font-size:14px;
      font-weight:700;
      margin-bottom:6px;
    }
    .progress-bar{
      width:100%;
      height:10px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
    }
    .progress-fill{
      height:100%;
      background:var(--accent);
      width:0%;
      transition:width .25s;
    }
    .qno{
      font-size:14px;
      font-weight:700;
      color:var(--sub);
      margin-bottom:6px;
    }
    .ja-box{
      font-size:30px;
      font-weight:700;
      text-align:center;
      padding:14px;
      border-radius:14px;
      background:#f8fafc;
      border:1px solid #dbe3f0;
      margin-bottom:16px;
    }
    .tiles{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      margin-bottom:16px;
      min-height:48px;
    }
    .tile{
      min-width:40px;
      height:40px;
      padding:0 10px;
      border-radius:10px;
      border:1.5px solid #94a3b8;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:700;
      cursor:pointer;
      user-select:none;
    }
    .answer-row{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
      min-height:50px;
      margin-bottom:12px;
    }
    .slot{
      width:40px;
      height:44px;
      border-bottom:3px solid #374151;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:700;
      background:#fff;
      border-radius:8px 8px 0 0;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-top:8px;
    }
    .message{
      min-height:30px;
      text-align:center;
      font-size:22px;
      font-weight:700;
      margin:10px 0 4px;
    }
    .message.good{color:var(--good)}
    .message.bad{color:var(--bad)}
    .small{
      text-align:center;
      color:var(--sub);
      font-size:13px;
      line-height:1.5;
    }
    .side-list h2{
      font-size:18px;
      margin:0 0 10px;
    }
    .word-list{
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      grid-template-columns:1fr;
      gap:6px;
    }
    .word-item{
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:10px;
      font-size:15px;
      background:#fff;
    }
    .word-item.done{
      background:#ecfdf5;
      color:#166534;
      border-color:#86efac;
    }
    .finish{
      display:none;
      text-align:center;
      padding:20px 10px 6px;
    }
    .finish.show{display:block}
    .finish h2{
      font-size:32px;
      margin:0 0 8px;
      color:var(--good);
    }

    .print-sheet{ display:none; }

    @media (max-width: 900px){
      .main{ grid-template-columns:1fr; }
      .ja-box{ font-size:26px; }
      .tile,.slot{ width:36px; min-width:36px; height:40px; font-size:22px; }
    }

    @page{
      size:A4 portrait;
      margin:12mm;
    }

    @media print{
      body{ background:#fff; }
      .wrap > :not(.print-sheet){ display:none !important; }
      .print-sheet{ display:block; color:#000; }
      .print-page{
        width:100%;
        page-break-after:always;
      }
      .print-page:last-child{ page-break-after:auto; }
      .print-title{
        text-align:center;
        font-size:18px;
        font-weight:700;
        margin-bottom:10px;
      }
      .print-meta{
        display:flex;
        justify-content:space-between;
        font-size:13px;
        margin-bottom:10px;
      }
      .line-box{
        display:inline-block;
        min-width:140px;
        border-bottom:1px solid #000;
        height:18px;
        vertical-align:bottom;
      }
      .instructions{
        font-size:12px;
        margin-bottom:8px;
      }
      .test-grid{
        display:grid;
        grid-template-columns:1fr;
        row-gap:5.2mm;
      }
      .test-item{
        break-inside:avoid;
        display:flex;
        align-items:flex-end;
        gap:4mm;
        min-height:10mm;
      }
      .test-no{
        font-size:12px;
        font-weight:700;
        width:10mm;
        flex:0 0 10mm;
      }
      .test-ja{
        font-size:13px;
        font-weight:700;
        white-space:nowrap;
      }
      .write-line{
        flex:1;
        border-bottom:1.3px solid #000;
        height:7.2mm;
      }
      .answer-list{
        font-size:13px;
        line-height:1.8;
        column-count:2;
        column-gap:12mm;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title-box">
      <div class="title">Laughter without Boarders<br>Spelling Test 1</div>
      <div class="subtitle">日本語を見て、英単語のスペリングを完成させよう（18 words）</div>
    </div>

    <div class="toolbar">
      <button class="primary" id="checkBtn">Check</button>
      <button id="clearBtn">Clear</button>
      <button id="shuffleBtn">Shuffle letters</button>
      <button id="nextBtn">Next</button>
      <button class="green" id="printBtn">PDFでテストを印刷</button>
    </div>

    <div class="main">
      <section class="card">
        <div class="progress-wrap">
          <div class="progress-label" id="progressText">1 / 16</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div class="qno" id="qno">Q1</div>
        <div class="ja-box" id="jaBox">研究</div>

        <div class="answer-row" id="answerRow"></div>
        <div class="tiles" id="tiles"></div>

        <div class="message" id="message"></div>
        <div class="small">下の文字をクリックして並べてください。上の文字をクリックすると戻せます。</div>

        <div class="controls">
          <button class="primary" id="checkBtn2">Check</button>
          <button id="clearBtn2">Clear</button>
          <button id="shuffleBtn2">Shuffle letters</button>
          <button id="nextBtn2">Next</button>
        </div>

        <div class="finish" id="finishBox">
          <h2>Laughter word list 1</h2>
        <ul class="word-list" id="wordList"></ul>
      </aside>
    </div>

    <section class="print-sheet" id="printSheet"></section>
  </div>

  <script>
const WORDS = [
  {
    "en": "laughter",
    "ja": "笑い"
  },
  {
    "en": "Ondrej Hybl",
    "ja": "オンドジェイ・ヒーブル（人名）"
  },
  {
    "en": "Czech Republic",
    "ja": "チェコ共和国"
  },
  {
    "en": "curious",
    "ja": "奇妙な、不思議な"
  },
  {
    "en": "intonation",
    "ja": "イントネーション、抑揚"
  },
  {
    "en": "performer",
    "ja": "演者、パフォーマー"
  },
  {
    "en": "elegant",
    "ja": "優雅な"
  },
  {
    "en": "reflection",
    "ja": "熟考、反省"
  },
  {
    "en": "eager",
    "ja": "熱心な、しきりに〜したがる"
  },
  {
    "en": "craft",
    "ja": "技術、工芸"
  },
  {
    "en": "revisit",
    "ja": "再び訪れる"
  },
  {
    "en": "heartening",
    "ja": "励みになる、元気づける"
  },
  {
    "en": "troupe",
    "ja": "一座、劇団"
  },
  {
    "en": "translate",
    "ja": "翻訳する"
  },
  {
    "en": "uniquely",
    "ja": "独特に、唯一無二に"
  },
  {
    "en": "somewhat",
    "ja": "いくらか、やや"
  },
  {
    "en": "old-fashioned",
    "ja": "古風な、昔ながらの"
  },
  {
    "en": "automatically",
    "ja": "自動的に"
  }
];

    let order = [...WORDS.keys()];
    let current = 0;
    let bank = [];
    let answer = [];
    let solved = new Set();

    const answerRow = document.getElementById('answerRow');
    const tiles = document.getElementById('tiles');
    const jaBox = document.getElementById('jaBox');
    const qno = document.getElementById('qno');
    const progressText = document.getElementById('progressText');
    const progressFill = document.getElementById('progressFill');
    const message = document.getElementById('message');
    const wordList = document.getElementById('wordList');
    const finishBox = document.getElementById('finishBox');
    const printSheet = document.getElementById('printSheet');

    function shuffleArray(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function currentWord(){
      return WORDS[order[current]];
    }

    function setupQuestion(){
      if(current >= order.length){
        finishBox.classList.add('show');
        jaBox.textContent = 'Finished!';
        qno.textContent = 'Complete';
        progressText.textContent = `${order.length} / ${order.length}`;
        progressFill.style.width = '100%';
        answerRow.innerHTML = '';
        tiles.innerHTML = '';
        message.textContent = '';
        renderWordList();
        return;
      }

      finishBox.classList.remove('show');
      const word = currentWord();
      bank = shuffleArray(word.en.split(''));
      answer = [];
      jaBox.textContent = word.ja;
      qno.textContent = `Q${current + 1}`;
      progressText.textContent = `${current + 1} / ${order.length}`;
      progressFill.style.width = `${(current / order.length) * 100}%`;
      message.textContent = '';
      message.className = 'message';
      renderAnswer();
      renderTiles();
      renderWordList();
    }

    function renderAnswer(){
      answerRow.innerHTML = '';
      const word = currentWord();
      for(let i = 0; i < word.en.length; i++){
        const div = document.createElement('div');
        div.className = 'slot';
        div.textContent = answer[i] || '';
        if(answer[i]){
          div.style.cursor = 'pointer';
          div.addEventListener('click', () => {
            bank.push(answer[i]);
            answer.splice(i, 1);
            renderAnswer();
            renderTiles();
          });
        }
        answerRow.appendChild(div);
      }
    }

    function renderTiles(){
      tiles.innerHTML = '';
      bank.forEach((ch, idx) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.textContent = ch;
        div.addEventListener('click', () => {
          answer.push(ch);
          bank.splice(idx, 1);
          renderAnswer();
          renderTiles();
        });
        tiles.appendChild(div);
      });
    }

    function renderWordList(){
      wordList.innerHTML = '';
      WORDS.forEach((w, i) => {
        const li = document.createElement('li');
        li.className = 'word-item';
        if(solved.has(i)) li.classList.add('done');
        li.textContent = `${solved.has(i) ? '☑' : '□'} ${w.ja}`;
        wordList.appendChild(li);
      });
    }

    function clearAnswer(){
      bank = [...bank, ...answer];
      answer = [];
      bank = shuffleArray(bank);
      renderAnswer();
      renderTiles();
      message.textContent = '';
      message.className = 'message';
    }

    function shuffleLetters(){
      bank = shuffleArray(bank);
      renderTiles();
    }

    function checkAnswer(){
      const typed = answer.join('');
      const word = currentWord();
      if(typed.length !== word.en.length){
        message.textContent = 'まだ文字が足りません。';
        message.className = 'message bad';
        return;
      }
      if(typed === word.en){
        solved.add(order[current]);
        message.textContent = 'Correct!';
        message.className = 'message good';
        renderWordList();
      } else {
        message.textContent = 'Try again!';
        message.className = 'message bad';
      }
    }

    function nextQuestion(){
      if(current >= order.length) return;
      current++;
      setupQuestion();
    }

    function buildPrintSheet(){
      printSheet.innerHTML = `
        ${makeTestPage()}
        ${makeAnswerPage()}
      `;
    }

    function makeTestPage(){
      return `
        <div class="print-page">
          <div class="print-title">Laughter without Boarders Spelling Test 1</div>
          <div class="print-meta">
            <div>Name: <span class="line-box"></span></div>
            <div>Date: <span class="line-box"></span></div>
          </div>
          <div class="instructions">日本語を見て、英単語のスペリングを書きましょう。</div>
          <div class="test-grid">
            ${WORDS.map((w, i) => `
              <div class="test-item">
                <div class="test-no">${i + 1}.</div>
                <div class="test-ja">${w.ja}</div>
                <div class="write-line"></div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function makeAnswerPage(){
      return `
        <div class="print-page">
          <div class="print-title">Laughter without Boarders Spelling Test 1 - Answers</div>
          <div class="answer-list">
            ${WORDS.map((w, i) => `${i + 1}. ${w.ja} ＝ ${w.en}`).join('<br>')}
          </div>
        </div>
      `;
    }

    function bind(id, fn){
      document.getElementById(id).addEventListener('click', fn);
    }

    bind('checkBtn', checkAnswer);
    bind('checkBtn2', checkAnswer);
    bind('clearBtn', clearAnswer);
    bind('clearBtn2', clearAnswer);
    bind('shuffleBtn', shuffleLetters);
    bind('shuffleBtn2', shuffleLetters);
    bind('nextBtn', nextQuestion);
    bind('nextBtn2', nextQuestion);
    bind('printBtn', () => {
      buildPrintSheet();
      window.print();
    });

    setupQuestion();
    buildPrintSheet();
  </script>
</body>
</html>
